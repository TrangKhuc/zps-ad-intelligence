<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZPS Ad Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles/main.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!--
  ZPS Ad Intelligence — Component Map
  =====================================
  Components:
    Topbar.html             — Logo, breadcrumb, Sync API button
    Sidebar.html            — Left nav (Overview, Creative Profile, Network & Trends, Playbook, Watchlist)
    CompetitorSelector.html — Search bar + dynamic watchlist chips
    IntelRail.html          — CHI/CREI/Downloads KPI bar (always visible)
    FilterBar.html          — Filter dropdowns
    TabNav.html             — Tab buttons
    TabOverview.html        — Competitor table + comparison charts + market intel
    TabCreativeProfile.html — Score breakdown + creative gallery + brainstorm
    TabTimerHeatmap.html    — Network & Trends (downloads vs creatives + trends + network table)
    TabPlaybook.html        — Performance snapshot + action queue + patterns
    TabSettings.html        — Watchlist management + API usage + export
-->

<div class="shell" id="app-shell">
  <!-- injected by component assembler below -->
</div>

<script type="module">
  const COMPONENTS = [
    'src/components/Topbar.html',
    'src/components/Sidebar.html',
  ];

  const MAIN_CONTENT = [
    'src/components/CompetitorSelector.html',
    'src/components/IntelRail.html',
    'src/components/FilterBar.html',
    'src/components/TabNav.html',
    'src/components/TabOverview.html',
    'src/components/TabCreativeProfile.html',
    'src/components/TabTimerHeatmap.html',
    'src/components/TabPlaybook.html',
    'src/components/TabSettings.html',
  ];

  async function loadComponent(path) {
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return await res.text();
    } catch (e) {
      console.warn('Could not load:', path, e.message);
      return `<!-- Failed to load ${path} -->`;
    }
  }

  async function init() {
    const shell = document.getElementById('app-shell');

    // Load topbar + sidebar
    for (const path of COMPONENTS) {
      const html = await loadComponent(path);
      shell.insertAdjacentHTML('beforeend', html);
    }

    // Wrap main content in .main div
    const mainDiv = document.createElement('div');
    mainDiv.className = 'main';
    for (const path of MAIN_CONTENT) {
      const html = await loadComponent(path);
      mainDiv.insertAdjacentHTML('beforeend', html);
    }
    shell.appendChild(mainDiv);

    // Load API client first, then main JS
    const apiScript = document.createElement('script');
    apiScript.src = 'src/api.js';
    apiScript.onload = () => {
      const mainScript = document.createElement('script');
      mainScript.src = 'src/main.js';
      document.body.appendChild(mainScript);
    };
    document.body.appendChild(apiScript);
  }

  init();
</script>

</body>
</html>
