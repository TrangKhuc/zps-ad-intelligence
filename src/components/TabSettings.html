<!-- TabSettings -->
<!-- ═══════════ SETTINGS & DATA ═══════════ -->
    <div class="content" id="tab-settings">

      <!-- ── Watchlist Management ── -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-head">
          <div>
            <div class="card-title">Watchlist Management</div>
            <div class="card-sub">Tracked apps · <span id="settings-app-count">0</span> apps</div>
          </div>
          <button class="card-btn" onclick="handleSyncAll()" id="settings-sync-all-btn">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M1 8a7 7 0 0 1 13.2-3.2M15 8A7 7 0 0 1 1.8 11.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            Sync All
          </button>
        </div>
        <div class="card-body" style="padding:0;">
          <div id="settings-watchlist">
            <div style="padding:20px;text-align:center;font-family:var(--fm);font-size:11px;color:var(--t3);">Loading watchlist…</div>
          </div>
        </div>
      </div>

      <!-- ── API Usage ── -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-head">
          <div>
            <div class="card-title">API Usage</div>
            <div class="card-sub">Sensor Tower API — current billing period</div>
          </div>
          <div id="settings-api-badge" style="font-family:var(--fm);font-size:9px;padding:3px 8px;border-radius:4px;background:rgba(16,185,129,0.12);color:#059669;font-weight:600;">Healthy</div>
        </div>
        <div class="card-body">
          <div style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-family:var(--fm);font-size:10px;color:var(--t2);" id="settings-api-count">0 / 500,000 calls</span>
              <span style="font-family:var(--fd);font-size:11px;font-weight:600;color:var(--t1);" id="settings-api-pct">0%</span>
            </div>
            <div style="height:6px;background:var(--page);border-radius:3px;overflow:hidden;">
              <div id="settings-api-bar" style="height:100%;background:var(--green);border-radius:3px;width:0%;transition:width 0.5s;"></div>
            </div>
          </div>
          <div style="font-family:var(--fm);font-size:9px;color:var(--t3);" id="settings-api-reset">Resets on the 1st of each month</div>
        </div>
      </div>

      <!-- ── Export Report ── -->
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">Export Report</div>
            <div class="card-sub">Generate markdown report for active app</div>
          </div>
        </div>
        <div class="card-body">
          <div style="display:flex;gap:12px;align-items:center;">
            <button class="card-btn" onclick="exportReport()" style="display:flex;align-items:center;gap:6px;">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M8 3v8M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Download .md Report
            </button>
            <span style="font-family:var(--fm);font-size:10px;color:var(--t3);">Includes all metrics, patterns, and action items for the active app</span>
          </div>
          <div id="settings-export-preview" style="margin-top:16px;padding:14px;background:var(--page);border-radius:8px;font-family:var(--fd);font-size:10px;color:var(--t2);max-height:200px;overflow-y:auto;display:none;">
            <!-- Preview populated by JS -->
          </div>
        </div>
      </div>

    </div><!-- /settings -->
