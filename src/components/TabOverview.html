<!-- TabOverview -->
<!-- ═══════════ OVERVIEW TAB ═══════════ -->
    <div class="content active" id="tab-sum">

      <!-- Competitor Comparison Table -->
      <style>
        .cmp-wrap { margin-bottom: 20px; }
        .cmp-table-scroll { overflow-x: auto; }
        .cmp-table {
          width: 100%;
          border-collapse: collapse;
          font-family: var(--fm);
          font-size: 12px;
        }
        .cmp-table thead tr {
          border-bottom: 2px solid var(--border);
        }
        .cmp-table th {
          padding: 6px 8px;
          text-align: left;
          font-size: 11px;
          font-weight: 600;
          color: var(--t2);
          white-space: nowrap;
        }
        .cmp-table th.cmp-metric-col {
          color: var(--t2);
          min-width: 100px;
        }
        .cmp-table th.cmp-app-col {
          text-align: right;
          min-width: 100px;
        }
        .cmp-table th.cmp-active-col {
          background: var(--accent-light);
          color: var(--accent);
          border-radius: 6px 6px 0 0;
          text-align: right;
        }
        .cmp-table tbody tr {
          border-bottom: 1px solid #f3f4f6;
          transition: background 0.12s;
        }
        .cmp-table tbody tr:last-child {
          border-bottom: none;
        }
        .cmp-table tbody tr:hover {
          background: var(--accent-light);
        }
        .cmp-table td {
          padding: 6px 8px;
          color: var(--t1);
          font-family: var(--fm);
          font-size: 12px;
        }
        .cmp-table td.cmp-metric-label {
          font-size: 12px;
          color: var(--t1);
          font-weight: 500;
        }
        .cmp-table td.cmp-val {
          text-align: right;
          font-family: var(--fd);
          font-size: 12px;
          font-weight: 500;
          color: var(--t0);
        }
        .cmp-table td.cmp-active-val {
          background: var(--accent-light);
          text-align: right;
          font-family: var(--fd);
          font-size: 12px;
          font-weight: 600;
          color: var(--t0);
        }
        .cmp-winner-badge {
          display: inline-block;
          color: #f59e0b;
          font-size: 10px;
          margin-left: 4px;
          vertical-align: middle;
        }
        .cmp-app-name {
          font-family: var(--fd);
          font-size: 11px;
          font-weight: 600;
          color: var(--t0);
          display: block;
          text-align: right;
        }
        .cmp-app-name-active {
          color: var(--accent);
        }
      </style>

      <!-- ── 1. Signal Banner (first, per mockup) ── -->
      <div class="signal-banner" id="signal-banner" style="margin-bottom:12px;">
        <div class="signal-banner-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--coral)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="signal-banner-body">
          <div class="signal-headline" id="ov-signal-headline" style="font-weight:600;">Loading signal…</div>
          <div class="signal-detail" id="ov-signal-detail" style="font-size:11px;">—</div>
        </div>
      </div>

      <!-- ── 2. Competitor Comparison Table ── -->
      <div class="cmp-wrap card">
        <div class="card-head">
          <div>
            <div class="card-title" style="font-weight:600;">Competitor Comparison</div>
          </div>
        </div>
        <div class="card-body" style="padding-top:0;">
          <div class="cmp-table-scroll">
            <table class="cmp-table" id="ov-comp-table">
              <thead>
                <tr>
                  <th class="cmp-metric-col">Metric</th>
                  <th class="cmp-active-col" id="cmp-head-app1">
                    <span class="cmp-app-name cmp-app-name-active" id="cmp-name-app1">App 1</span>
                  </th>
                  <th class="cmp-app-col" id="cmp-head-app2">
                    <span class="cmp-app-name" id="cmp-name-app2">App 2</span>
                  </th>
                  <th class="cmp-app-col" id="cmp-head-app3">
                    <span class="cmp-app-name" id="cmp-name-app3">App 3</span>
                  </th>
                </tr>
              </thead>
              <tbody id="cmp-tbody">
                <tr><td class="cmp-metric-label">CHI</td><td class="cmp-active-val" id="cmp-chi-app1">—</td><td class="cmp-val" id="cmp-chi-app2">—</td><td class="cmp-val" id="cmp-chi-app3">—</td></tr>
                <tr><td class="cmp-metric-label">CREI</td><td class="cmp-active-val" id="cmp-crei-app1">—</td><td class="cmp-val" id="cmp-crei-app2">—</td><td class="cmp-val" id="cmp-crei-app3">—</td></tr>
                <tr><td class="cmp-metric-label">Downloads</td><td class="cmp-active-val" id="cmp-dl-app1">—</td><td class="cmp-val" id="cmp-dl-app2">—</td><td class="cmp-val" id="cmp-dl-app3">—</td></tr>
                <tr><td class="cmp-metric-label">Revenue</td><td class="cmp-active-val" id="cmp-rev-app1">—</td><td class="cmp-val" id="cmp-rev-app2">—</td><td class="cmp-val" id="cmp-rev-app3">—</td></tr>
                <tr><td class="cmp-metric-label">Creatives</td><td class="cmp-active-val" id="cmp-creatives-app1">—</td><td class="cmp-val" id="cmp-creatives-app2">—</td><td class="cmp-val" id="cmp-creatives-app3">—</td></tr>
                <tr><td class="cmp-metric-label">Networks</td><td class="cmp-active-val" id="cmp-networks-app1">—</td><td class="cmp-val" id="cmp-networks-app2">—</td><td class="cmp-val" id="cmp-networks-app3">—</td></tr>
                <tr><td class="cmp-metric-label">DL Trend</td><td class="cmp-active-val" id="cmp-trend-app1">—</td><td class="cmp-val" id="cmp-trend-app2">—</td><td class="cmp-val" id="cmp-trend-app3">—</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ── 3. Downloads Comparison Chart (full width per mockup) ── -->
      <div class="card" style="margin-bottom:12px;">
        <div class="card-head">
          <div>
            <div class="card-title" style="font-weight:600;">Downloads Comparison</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center;">
            <select class="sort-sel" id="ov-dl-chart-range" onchange="updateOverviewCharts()" style="font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;color:var(--t2);background:#fff;">
              <option value="3">Weekly · 8w</option>
              <option value="6">Weekly · 12w</option>
            </select>
            <div class="chart-type-toggle" data-chart="c-ov-dl-compare" style="display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;">
              <button onclick="toggleChartType('c-ov-dl-compare','bar',this)" class="ct-btn ct-active" style="padding:4px 10px;font-size:11px;border:none;cursor:pointer;font-family:inherit;background:#4d65ff;color:#fff;font-weight:500;">Bar</button>
              <button onclick="toggleChartType('c-ov-dl-compare','line',this)" class="ct-btn" style="padding:4px 10px;font-size:11px;border:none;border-left:1px solid var(--border);cursor:pointer;font-family:inherit;background:#fff;color:var(--t2);">Line</button>
            </div>
          </div>
        </div>
        <div class="card-body"><div class="f2-chart-wrap"><canvas id="c-ov-dl-compare"></canvas></div></div>
      </div>

      <!-- ── 4. Revenue + Creative Volume (grid-2 per mockup) ── -->
      <div class="grid-2" style="gap:12px;margin-bottom:12px;">
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title" style="font-weight:600;">Revenue Comparison</div>
            </div>
            <div class="chart-type-toggle" data-chart="c-ov-rev-compare" style="display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;">
              <button onclick="toggleChartType('c-ov-rev-compare','bar',this)" class="ct-btn ct-active" style="padding:4px 10px;font-size:11px;border:none;cursor:pointer;font-family:inherit;background:#4d65ff;color:#fff;font-weight:500;">Bar</button>
              <button onclick="toggleChartType('c-ov-rev-compare','line',this)" class="ct-btn" style="padding:4px 10px;font-size:11px;border:none;border-left:1px solid var(--border);cursor:pointer;font-family:inherit;background:#fff;color:var(--t2);">Line</button>
            </div>
          </div>
          <div class="card-body"><div class="f2-chart-wrap"><canvas id="c-ov-rev-compare"></canvas></div></div>
        </div>
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title" style="font-weight:600;">Creative Volume Trend</div>
            </div>
            <div class="chart-type-toggle" data-chart="c-ov-creative-trend" style="display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;">
              <button onclick="toggleChartType('c-ov-creative-trend','bar',this)" class="ct-btn" style="padding:4px 10px;font-size:11px;border:none;border-right:1px solid var(--border);cursor:pointer;font-family:inherit;background:#fff;color:var(--t2);">Bar</button>
              <button onclick="toggleChartType('c-ov-creative-trend','line',this)" class="ct-btn ct-active" style="padding:4px 10px;font-size:11px;border:none;cursor:pointer;font-family:inherit;background:#4d65ff;color:#fff;font-weight:500;">Line</button>
            </div>
          </div>
          <div class="card-body"><div class="f2-chart-wrap"><canvas id="c-ov-creative-trend"></canvas></div></div>
        </div>
      </div>

      <!-- ── 5. Market Intelligence — multi-app (grid-3 layout per mockup) ── -->
      <div class="card" style="margin-bottom:12px;">
        <div class="card-head">
          <div>
            <div class="card-title" style="font-weight:600;">Market Intelligence — All Apps</div>
          </div>
        </div>
        <div class="card-body" style="padding-top:0;">
          <div id="ov-market-intel" style="overflow-x:auto;">
            <table class="cmp-table" style="min-width:500px;">
              <thead>
                <tr>
                  <th class="cmp-metric-col">Country</th>
                  <th class="cmp-app-col" id="mi-head-app1">App 1</th>
                  <th class="cmp-app-col" id="mi-head-app2">App 2</th>
                  <th class="cmp-app-col" id="mi-head-app3">App 3</th>
                </tr>
              </thead>
              <tbody id="mi-tbody">
                <tr><td class="cmp-metric-label" colspan="4" style="text-align:center;color:var(--t3);">Select apps to see market comparison</td></tr>
              </tbody>
            </table>
          </div>
          <div class="insight-pills" id="mi-pills" style="margin-top:8px;"></div>
        </div>
      </div>

      <!-- ── 6. Export button (per mockup) ── -->
      <div style="text-align:right;margin-bottom:12px;">
        <button class="export-btn" onclick="exportReport()" style="padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">
          Export Report (.md)
        </button>
      </div>

      <!-- Hidden elements for JS compatibility — keep IDs but hide -->
      <div style="display:none;">
        <span id="ov-total-dl"></span><span id="ov-total-rev"></span><span id="ov-active-creatives"></span><span id="ov-avg-wk"></span>
        <span id="ov-dl-sub"></span><span id="ov-rev-sub"></span><span id="ov-active-sub"></span><span id="ov-avg-wk-sub"></span>
        <span id="ov-sc1-label"></span><span id="ov-sc1-headline"></span><span id="ov-sc1-meta"></span>
        <span id="ov-sc2-label"></span><span id="ov-sc2-headline"></span><span id="ov-sc2-meta"></span>
        <span id="ov-sc3-label"></span><span id="ov-sc3-headline"></span><span id="ov-sc3-meta"></span>
        <span id="ov-date-range"></span><span id="ov-country-signal"></span>
        <span id="ov-us-rev"></span><span id="ov-mx-rev"></span><span id="ov-us-rpd"></span><span id="ov-mx-rpd"></span><span id="ov-rpd-gap"></span>
        <span id="ov-aq1"></span><span id="ov-aq2"></span><span id="ov-aq3"></span><span id="ov-aq4"></span><span id="ov-aq5"></span><span id="ov-aq6"></span>
      </div>
    </div>
